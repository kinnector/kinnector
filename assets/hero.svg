<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" width="100%" height="auto">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16" />
  
  <!-- Grid Pattern -->
  <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" />
  <path d="M 100,0 L 100,350 M 200,0 L 200,350 M 300,0 L 300,350 M 400,0 L 400,350 M 500,0 L 500,350 M 600,0 L 600,350 M 700,0 L 700,350 M 800,0 L 800,350 M 900,0 L 900,350 M 1000,0 L 1000,350 M 1100,0 L 1100,350" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" />
  
  <!-- Abstract Cyber Network Graphic -->
  <g opacity="0.35">
    <circle cx="1050" cy="100" r="4" fill="#34d399" />
    <circle cx="1120" cy="180" r="3" fill="#3b82f6" />
    <circle cx="980" cy="220" r="5" fill="#8b5cf6" />
    <circle cx="1080" cy="280" r="3" fill="#64748b" />
    <circle cx="920" cy="120" r="4" fill="#38bdf8" />
    <line x1="1050" y1="100" x2="1120" y2="180" stroke="#64748b" stroke-width="1.5" />
    <line x1="1120" y1="180" x2="1080" y2="280" stroke="#64748b" stroke-width="1.5" />
    <line x1="980" y1="220" x2="1080" y2="280" stroke="#64748b" stroke-width="1.5" />
    <line x1="1050" y1="100" x2="980" y2="220" stroke="#64748b" stroke-width="1.5" />
    <line x1="920" y1="120" x2="1050" y2="100" stroke="#64748b" stroke-width="1.5" />
    <line x1="920" y1="120" x2="980" y2="220" stroke="#64748b" stroke-width="1.5" />
  </g>

  <!-- Large Glowing Circle -->
  <circle cx="150" cy="175" r="180" fill="url(#glow-grad)" filter="url(#glow)" />
  <circle cx="150" cy="175" r="60" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="10 15" opacity="0.3" />
  
  <!-- Logo Hexagon -->
  <g transform="translate(150, 175) scale(0.9)">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="url(#primary-grad)" stroke-width="5" filter="url(#glow)" />
    <!-- Dynamic Inner Lines -->
    <path d="M 0,-40 L 34.6,-20 L 34.6,20 L 0,40 L -34.6,20 L -34.6,-20 Z" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2" />
    <!-- Center Dot/Core -->
    <circle cx="0" cy="0" r="10" fill="#34d399" filter="url(#glow)" />
    <path d="M 0,0 L 0,-60 M 0,0 L 52,30 M 0,0 L -52,30" stroke="url(#primary-grad)" stroke-width="2" opacity="0.6" />
  </g>

  <!-- Typography -->
  <text x="270" y="170" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="76" fill="url(#primary-grad)" letter-spacing="4">KINNECTOR</text>
  <text x="275" y="215" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="20" fill="#94a3b8" letter-spacing="1">Unified Threat Intelligence &amp; Endpoint Defense</text>
  
  <!-- Decorative Tech Borders -->
  <path d="M 20 20 L 80 20 M 20 20 L 20 80" stroke="#34d399" stroke-width="3" fill="none" />
  <path d="M 1180 20 L 1120 20 M 1180 20 L 1180 80" stroke="#8b5cf6" stroke-width="3" fill="none" />
  <path d="M 20 330 L 80 330 M 20 330 L 20 270" stroke="#34d399" stroke-width="3" fill="none" />
  <path d="M 1180 330 L 1120 330 M 1180 330 L 1180 270" stroke="#8b5cf6" stroke-width="3" fill="none" />
</svg>
