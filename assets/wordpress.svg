<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="auto">
  <defs>
    <linearGradient id="bg-wp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accent-wp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-wp)" rx="12" stroke="#f59e0b" stroke-width="1.5" opacity="0.8" />
  
  <!-- Icon Graphics (WordPress Security) -->
  <g transform="translate(200, 95) scale(1.1)">
    <!-- Shield/Gate Outer -->
    <path d="M 0,-35 L 30,-22 L 30,5 C 30,22 0,32 0,32 C 0,32 -30,22 -30,5 L -30,-22 Z" fill="#1e293b" stroke="#475569" stroke-width="2" />
    
    <!-- Glowing WP Logo / Emblem inside Shield -->
    <circle cx="0" cy="-2" r="18" fill="url(#accent-wp)" filter="url(#glow-amber)" />
    
    <!-- WP Character W -->
    <path d="M -9,-9 L -5,3 L -2,-4 L 1,3 L 5,-9 L 8,-9 L 3,7 L 0,-2 L -3,7 L -8,-9 Z" fill="#ffffff" />
    
    <!-- Outer Security Rings / Lock -->
    <path d="M -40,-10 C -45,10 -25,38 0,42 C 25,38 45,10 40,-10" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 5" opacity="0.7" />
  </g>
  
  <!-- Typography -->
  <text x="200" y="195" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">WORDPRESS SECURITY</text>
  <text x="200" y="220" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="12" fill="#64748b" text-anchor="middle">Active WordPress Runtime &amp; Injection Defense</text>
</svg>
