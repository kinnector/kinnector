<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="auto">
  <defs>
    <linearGradient id="bg-warden" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accent-warden" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-warden)" rx="12" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8" />
  
  <!-- Icon Graphics (Server Nodes / Fleet Coordinator) -->
  <g transform="translate(200, 95) scale(1.1)">
    <!-- Central Node -->
    <circle cx="0" cy="-20" r="22" fill="url(#accent-warden)" filter="url(#glow-purple)" />
    <path d="M -8,-25 L 8,-25 L 8,-15 L -8,-15 Z M -5,-15 L 5,-15 L 0,-5 Z" fill="#ffffff" />
    <circle cx="0" cy="-20" r="12" fill="none" stroke="#ffffff" stroke-width="2" />
    
    <!-- Secondary Nodes -->
    <circle cx="-50" cy="20" r="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    <circle cx="0" cy="30" r="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    <circle cx="50" cy="20" r="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    
    <!-- Connection Lines -->
    <line x1="-15" y1="-5" x2="-45" y2="12" stroke="#6366f1" stroke-width="2" stroke-dasharray="2 4" />
    <line x1="0" y1="2" x2="0" y2="20" stroke="#6366f1" stroke-width="2" stroke-dasharray="2 4" />
    <line x1="15" y1="-5" x2="45" y2="12" stroke="#6366f1" stroke-width="2" stroke-dasharray="2 4" />
    
    <!-- Radar Waves -->
    <circle cx="0" cy="-20" r="38" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.5" />
  </g>
  
  <!-- Typography -->
  <text x="200" y="195" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">WARDEN CENTRAL FLEET</text>
  <text x="200" y="220" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="12" fill="#64748b" text-anchor="middle">Server Coordinator &amp; Telemetry Aggregator</text>
</svg>
